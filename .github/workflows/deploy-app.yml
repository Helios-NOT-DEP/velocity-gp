name: Deploy Code to DigitalOcean
on:
  # push:
  #   branches: [main]
  workflow_dispatch: # allows you to run the workflow manually from the Actions tab
    inputs:
      environment:
        description: "Environment to run against"
        type: environment
        required: true
      reseed_data:
        description: "Reseed the database data"
        type: boolean
        required: false
        default: false
permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: ${{ inputs.environment }}-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      CLIENT_BASE_URL: ${{ vars.CLIENT_BASE_URL || '' }}
      FRONTEND_MAGIC_LINK_ORIGIN: ${{ vars.FRONTEND_MAGIC_LINK_ORIGIN || 'https://dev.velocitygp.app' }}
      DO_API_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DO_APP_ID: ${{ vars.DO_APP_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate doctl (DigitalOcean CLI)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: "18"

      # - name: Install PostgreSQL Client
      #   run: |
      #     sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
      #     wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
      #     sudo apt-get update
      #     sudo apt-get install -y postgresql-client-18
      #     sudo ln -sf /usr/lib/postgresql/18/bin/pg_dump /usr/local/bin/pg_dump
      #     sudo ln -sf /usr/lib/postgresql/18/bin/psql /usr/local/bin/psql
      #     echo "/usr/lib/postgresql/18/bin" >> $GITHUB_PATH

      # - name: Check pg_dump version
      #   run: pg_dump --version

      - name: Install Dependencies
        run: npm ci
        
      - name: Get Action IP
        if: ${{ inputs.environment == 'prod' }}
        id: ip
        run: |
          IPV4=$(curl -s https://api.ipify.org)
          echo "ipv4=$IPV4" >> $GITHUB_OUTPUT

      - name: Whitelist Runner IP
        if: ${{ inputs.environment == 'prod' }}
        id: whitelist
        run: |
          IP_ADDR="${{ steps.ip.outputs.ipv4 }}/32"
          # Run the command and capture output
          OUTPUT=$(doctl databases firewalls append ${{ vars.DB_CLUSTER_ID }} --rule "ip_addr:$IP_ADDR")
          echo "$OUTPUT"
          # Extract UUID for the specific IP
          UUID=$(echo "$OUTPUT" | grep "$IP_ADDR" | awk '{print $1}')
          echo "uuid=$UUID" >> $GITHUB_OUTPUT

      - name: Run Database Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEED_DATABASE_URL: ${{ secrets.SEED_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.SEED_DATABASE_URL }}
          SPACE_ACCESS_KEY_ID: ${{ vars.SPACE_ACCESS_KEY_ID }}
          SPACE_SECRET_ACCESS_KEY: ${{ secrets.SPACE_SECRET_ACCESS_KEY }}
          SPACE_BACKUP_ENDPOINT_DOMAIN: ${{ vars.SPACE_BACKUP_ENDPOINT_DOMAIN }}
          SPACE_BACKUP_BUCKET: ${{ vars.SPACE_BACKUP_BUCKET }}
        run: |
            npm run db:deploy


      - name: Run Database Seed for dev
        if: ${{ inputs.environment == 'dev' && inputs.reseed_data == 'true' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEED_DATABASE_URL: ${{ secrets.SEED_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.SEED_DATABASE_URL }}
          SPACE_ACCESS_KEY_ID: ${{ vars.SPACE_ACCESS_KEY_ID }}
          SPACE_SECRET_ACCESS_KEY: ${{ secrets.SPACE_SECRET_ACCESS_KEY }}
          SPACE_BACKUP_ENDPOINT_DOMAIN: ${{ vars.SPACE_BACKUP_ENDPOINT_DOMAIN }}
          SPACE_BACKUP_BUCKET: ${{ vars.SPACE_BACKUP_BUCKET }}
        run: |
            npm run db:generate
            npm run db:seed
      # - if: vars.DO_APP_ID == ' '
      #   name: Deploy App
      #   run: doctl apps create-deployment ${{ vars.DO_APP_ID }} --verbose --wait
      - name: Remove IP from Whitelist
        if: inputs.environment == 'prod' && always() && steps.whitelist.outputs.uuid != ''
        run: doctl databases firewalls remove ${{ vars.DB_CLUSTER_ID }} --uuid ${{ steps.whitelist.outputs.uuid }}

      - name: Trigger DigitalOcean App Platform deployment
        run: |
          set -euo pipefail
          if [ -z "${DO_APP_ID// }" ]; then
            echo "Error: DO_APP_ID secret is not set" >&2
            exit 1
          fi
          echo "Creating a deployment for app id: ${DO_APP_ID}"
          doctl apps create-deployment "${DO_APP_ID}" --wait

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-build-artifacts
          path: |
            dist
            build
