name: Deploy Code to DigitalOcean
on:
  # push:
  #   branches: [main]
  workflow_dispatch: # allows you to run the workflow manually from the Actions tab
    inputs:
      environment:
        description: "Environment to run against"
        type: environment
        required: true
permissions:
  contents: read
  id-token: write
  pull-requests: read

concurrency:
  group: ${{ inputs.environment }}-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to DigitalOcean
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    env:
      CLIENT_BASE_URL: ${{ vars.CLIENT_BASE_URL || '' }}
      FRONTEND_MAGIC_LINK_ORIGIN: ${{ vars.FRONTEND_MAGIC_LINK_ORIGIN || 'https://dev.velocitygp.app' }}
      DO_API_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
      DO_APP_ID: ${{ vars.DO_APP_ID }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate doctl (DigitalOcean CLI)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup PostgreSQL
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: "18"

      # - name: Install PostgreSQL Client
      #   run: |
      #     sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
      #     wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
      #     sudo apt-get update
      #     sudo apt-get install -y postgresql-client-18
      #     sudo ln -sf /usr/lib/postgresql/18/bin/pg_dump /usr/local/bin/pg_dump
      #     sudo ln -sf /usr/lib/postgresql/18/bin/psql /usr/local/bin/psql
      #     echo "/usr/lib/postgresql/18/bin" >> $GITHUB_PATH

      # - name: Check pg_dump version
      #   run: pg_dump --version

      - name: Install Dependencies
        run: npm ci

      - name: Run Database Migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SEED_DATABASE_URL: ${{ secrets.SEED_DATABASE_URL }}
          DIRECT_DATABASE_URL: ${{ secrets.SEED_DATABASE_URL }}
          SPACE_ACCESS_KEY_ID: ${{ vars.SPACE_ACCESS_KEY_ID }}
          SPACE_SECRET_ACCESS_KEY: ${{ secrets.SPACE_SECRET_ACCESS_KEY }}
          SPACE_BACKUP_ENDPOINT_DOMAIN: ${{ vars.SPACE_BACKUP_ENDPOINT_DOMAIN }}
          SPACE_BACKUP_BUCKET: ${{ vars.SPACE_BACKUP_BUCKET }}
        run: npm run db:deploy

      # - if: vars.DO_APP_ID == ' '
      #   name: Deploy App
      #   run: doctl apps create-deployment ${{ vars.DO_APP_ID }} --verbose --wait

      - name: Trigger DigitalOcean App Platform deployment
        run: |
          set -euo pipefail
          if [ -z "${DO_APP_ID// }" ]; then
            echo "Error: DO_APP_ID secret is not set" >&2
            exit 1
          fi
          echo "Creating a deployment for app id: ${DO_APP_ID}"
          doctl apps create-deployment "${DO_APP_ID}" --wait

      - name: Verify Deployment Version
        if: success()
        run: |
          set -euo pipefail

          # Health endpoint configuration
          HEALTH_URL="${CLIENT_BASE_URL%/}/api/v1/health"
          MAX_ATTEMPTS=20
          RETRY_DELAY=10
          ATTEMPT=0
          HTTP_CODE=0
          BODY=""

          # Extract source versions from monorepo package manifests
          ROOT_VERSION=$(jq -r '.version // empty' package.json)
          API_VERSION=$(jq -r '.version // empty' api/package.json)
          CLIENT_VERSION=$(jq -r '.version // empty' client/package.json)
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Deployment Verification"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Source versions:"
          echo "  root:   ${ROOT_VERSION:-unknown}"
          echo "  api:    ${API_VERSION:-unknown}"
          echo "  client: ${CLIENT_VERSION:-unknown}"
          echo "Health endpoint URL: $HEALTH_URL"
          echo ""

          # Retry logic: wait for health endpoint to be responsive
          echo "Waiting for health endpoint to be responsive..."
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo -n "  Attempt $ATTEMPT/$MAX_ATTEMPTS: "

            # Create temporary files for response parts
            RESPONSE_FILE=$(mktemp)
            trap "rm -f $RESPONSE_FILE" EXIT

            # Curl with separate HTTP code capture
            HTTP_CODE=$(curl -s -o "$RESPONSE_FILE" -w "%{http_code}" "$HEALTH_URL" 2>&1 || echo "000")
            BODY=$(cat "$RESPONSE_FILE" 2>/dev/null || echo "")

            # Check if we got a valid response code
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✓ OK (HTTP 200)"
              break
            else
              echo "waiting... (HTTP $HTTP_CODE)"
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                sleep $RETRY_DELAY
              fi
            fi
          done

          # Verify endpoint responded
          if [ "$HTTP_CODE" != "200" ]; then
            echo ""
            echo "❌ VERIFICATION FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Health endpoint did not respond with 200 after $MAX_ATTEMPTS attempts"
            echo "Last HTTP status: $HTTP_CODE"
            echo "URL: $HEALTH_URL"
            echo "Last response body:"
            echo "$BODY"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          # Parse health response - try to extract api-version, handle both success and error cases
          echo ""
          echo "Health endpoint response:"
          echo "$BODY" | jq '.' 2>/dev/null || echo "$BODY"
          echo ""

          # Try to extract deployed versions from multiple response shapes
          DEPLOYED_API_VERSION=$(echo "$BODY" | jq -r '."api-version" // .apiVersion // .data."api-version" // .data.apiVersion // empty' 2>/dev/null || echo "")
          DEPLOYED_CLIENT_VERSION=$(echo "$BODY" | jq -r '."client-version" // .clientVersion // .data."client-version" // .data.clientVersion // empty' 2>/dev/null || echo "")

          if [ -z "$DEPLOYED_API_VERSION" ] && [ -z "$DEPLOYED_CLIENT_VERSION" ]; then
            echo "❌ VERIFICATION FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Health endpoint response missing both API and client version fields"
            echo "Expected one of: api-version/apiVersion and client-version/clientVersion"
            echo "Full response:"
            echo "$BODY"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

          # Compare versions
          echo "Extracted deployed versions:"
          echo "  api:    ${DEPLOYED_API_VERSION:-unknown}"
          echo "  client: ${DEPLOYED_CLIENT_VERSION:-unknown}"
          echo ""

          API_MATCH=false
          CLIENT_MATCH=false

          if [ -n "$DEPLOYED_API_VERSION" ] && [ "$DEPLOYED_API_VERSION" != "unknown" ]; then
            if [ "$DEPLOYED_API_VERSION" = "$API_VERSION" ] || [ "$DEPLOYED_API_VERSION" = "$ROOT_VERSION" ]; then
              API_MATCH=true
            fi
          fi

          if [ -n "$DEPLOYED_CLIENT_VERSION" ] && [ "$DEPLOYED_CLIENT_VERSION" != "unknown" ]; then
            if [ "$DEPLOYED_CLIENT_VERSION" = "$CLIENT_VERSION" ] || [ "$DEPLOYED_CLIENT_VERSION" = "$ROOT_VERSION" ]; then
              CLIENT_MATCH=true
            fi
          fi

          if [ "$API_MATCH" = true ] || [ "$CLIENT_MATCH" = true ]; then
            echo "✅ VERIFICATION SUCCESSFUL"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Deployed application is live and reports expected version(s)"
            echo "Domain: $CLIENT_BASE_URL"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 0
          else
            echo "❌ VERIFICATION FAILED"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Version mismatch detected!"
            echo "Expected api:           ${API_VERSION:-unknown}"
            echo "Expected client:        ${CLIENT_VERSION:-unknown}"
            echo "Expected root:          ${ROOT_VERSION:-unknown}"
            echo "Deployed api:           ${DEPLOYED_API_VERSION:-unknown}"
            echo "Deployed client:        ${DEPLOYED_CLIENT_VERSION:-unknown}"
            echo ""
            echo "This may indicate:"
            echo "  - The deployment did not complete successfully"
            echo "  - The app is running a previous version"
            echo "  - Runtime could not resolve package.json in deployed environment"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-build-artifacts
          path: |
            dist
            build
