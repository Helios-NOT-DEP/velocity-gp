# DigitalOcean App Platform spec for Cloud Team CDA application
# This spec defines two components:
#  1) `api` - a container service built using the repository Dockerfile (production multi-stage Dockerfile)
#  2) `client` - a static site that builds the React client located in client and serves the output
#
# NOTE:
# - This is a template. Update `repo` if your GitHub org or repository name differs.
# - If you prefer to manage the service differently (e.g. a single Docker image for both API+client), update accordingly.
# - Keep secrets (DATABASE_URL, JWT_SECRET, etc.) in the DigitalOcean App Platform UI (app settings) or connect via project-level secrets.

name: ${ENV}-velocity-app
region: nyc
alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED
domains:
  - domain: ${FULL_DOMAIN} 
    type: PRIMARY
    zone: ${DOMAIN}
features:
  - buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: api
    match:
      path:
        prefix: /api/v1
  - component:
      name: client
    match:
      path:
        prefix: /
services:
  - build_command: NODE_ENV=development npm ci && NODE_ENV=development npm run build:api
    environment_slug: node-js
    github:
      branch: ${GITHUB_BRANCH}
      repo: ${GITHUB_REPOSITORY}
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    name: api
    run_command: node apps/api/dist/src/server.js
    source_dir: /
    envs:
      - key: NODE_ENV
        value: "${NODE_ENV}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: PORT
        value: "${PORT}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: API_PREFIX
        value: ""
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: CLIENT_BASE_URL
        value: "${CLIENT_BASE_URL}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL          
      - key: JWT_SECRET
        value: "${JWT_SECRET}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: JWT_EXPIRES_IN
        value: "${JWT_EXPIRES_IN}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: JWT_COOKIE_NAME
        value: "${JWT_COOKIE_NAME}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: CORS_ORIGIN
        value: "${CORS_ORIGIN}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: LOG_LEVEL
        value: "${LOG_LEVEL}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: LOG_FORMAT
        value: "${LOG_FORMAT}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: DATABASE_URL
        value: "${DATABASE_URL}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SEED_DATABASE_URL
        value: "${SEED_DATABASE_URL}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DIRECT_DATABASE_URL
        value: "${DIRECT_DATABASE_URL}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: MAGIC_LINK_TOKEN_EXPIRY_DATE
        value: "${MAGIC_LINK_TOKEN_EXPIRY_DATE}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: VITE_PUBLIC_POSTHOG_KEY
        value: "${POSTHOG_KEY}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: VITE_PUBLIC_POSTHOG_HOST
        value: "${POSTHOG_HOST}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: SPACE_ACCESS_KEY_ID
        value: "${SPACE_ACCESS_KEY_ID}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: SPACE_SECRET_ACCESS_KEY
        value: "${SPACE_SECRET_ACCESS_KEY}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: SPACE_ENDPOINT
        value: "${SPACE_ENDPOINT}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: SPACE_ENDPOINT_DOMAIN
        value: "${SPACE_ENDPOINT_DOMAIN}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: SPACE_BUCKET
        value: "${SPACE_BUCKET}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: CLIENT_PACKAGE_PATH
        value: "${CLIENT_PACKAGE_PATH}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: API_PACKAGE_PATH
        value: "${API_PACKAGE_PATH}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: FRONTEND_ORIGIN
        value: "${FRONTEND_ORIGIN}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: AUTH_SECRET
        value: "${AUTH_SECRET}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: MAGIC_LINK_TOKEN_TTL_MINUTES
        value: "${MAGIC_LINK_TOKEN_TTL_MINUTES}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: AUTH_SESSION_TTL_HOURS
        value: "${AUTH_SESSION_TTL_HOURS}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: N8N_HOST
        value: "${N8N_HOST}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: N8N_WEBHOOK_TOKEN
        value: "${N8N_WEBHOOK_TOKEN}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: MAILTRAP_WEBHOOK_SECRET
        value: "${MAILTRAP_WEBHOOK_SECRET}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET        
      - key: N8N_EMAIL_WEBHOOK_TIMEOUT_MS
        value: "${N8N_EMAIL_WEBHOOK_TIMEOUT_MS}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: PIT_RELEASE_SCHEDULER_ENABLED
        value: "${PIT_RELEASE_SCHEDULER_ENABLED}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: PIT_RELEASE_POLL_INTERVAL_MS
        value: "${PIT_RELEASE_POLL_INTERVAL_MS}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: PIT_RELEASE_BATCH_SIZE
        value: "${PIT_RELEASE_BATCH_SIZE}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: PIT_RELEASE_WEBHOOK_URL
        value: "${PIT_RELEASE_WEBHOOK_URL}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: PIT_RELEASE_WEBHOOK_TIMEOUT_MS
        value: "${PIT_RELEASE_WEBHOOK_TIMEOUT_MS}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: SERVICE_NAME
        value: "${SERVICE_NAME}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
    # liveness_health_check:
    #   http_path: /api/v1/health
    #   period_seconds: 10
    #   success_threshold: 1
    #   failure_threshold: 3
    #   timeout_seconds: 5
static_sites:
  - build_command: NODE_ENV=development npm install && NODE_ENV=development npm run build:web
    environment_slug: node-js
    github:
        branch: ${GITHUB_BRANCH}
        repo: ${GITHUB_REPOSITORY}
    name: client
    output_dir: ./apps/web/dist
    catchall_document: index.html
    source_dir: /
    envs:
      - key: CLIENT_BASE_URL
        value: "${CLIENT_BASE_URL}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: VITE_API_BASE_URL
        value: "${_self.PUBLIC_URL}api"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: VITE_PUBLIC_POSTHOG_KEY
        value: "${POSTHOG_KEY}"
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: VITE_PUBLIC_POSTHOG_HOST
        value: "${POSTHOG_HOST}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: VITE_OBSERVABILITY_DEBUG
        value: "${VITE_OBSERVABILITY_DEBUG}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: VITE_OTEL_TRACE_SAMPLING_RATE
        value: "${VITE_OTEL_TRACE_SAMPLING_RATE}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: DEBUG
        value: "${DEBUG}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
      - key: SOURCEMAP
        value: "${SOURCEMAP}"
        scope: RUN_AND_BUILD_TIME
        type: GENERAL
